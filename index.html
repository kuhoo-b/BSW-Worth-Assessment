<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSW Interface 2.0</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; overflow: hidden !important; }
    .video-page { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; background: #000 !important; padding: 0 !important; margin: 0 !important; }
    #intro-video { position: absolute !important; top: calc(55% - 70px) !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 72vw !important; height: auto !important; max-height: 70vh !important; border-radius: 10px !important; display: block !important; }
    #play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
      z-index: 10;
    }
    #play-btn:hover { background: rgba(255,255,255,0.28); }
    #play-btn svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }
  </style>
</head>
<body data-page="index">
  <div class="video-page">
    <video id="intro-video" playsinline>
      <source src="Assets/WELCOME_TO_BSW.mp4" type="video/mp4">
    </video>
    <button id="play-btn" aria-label="Play">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
  </div>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const vid = document.getElementById('intro-video');
      const btn = document.getElementById('play-btn');
      if(!vid || !btn) return;

      btn.addEventListener('click', function(){
        btn.style.display = 'none';
        vid.muted = false;
        vid.volume = 1;
        vid.play();
      });

      vid.addEventListener('ended', function(){ window.location.href = 'intro.html'; });

      // On bfcache restore, show the button again and reset video
      window.addEventListener('pageshow', function(e){
        if(e.persisted){
          try{ vid.pause(); vid.currentTime = 0; }catch(e){}
          btn.style.display = 'flex';
        }
      });
    });
  </script>
</body>
</html>
